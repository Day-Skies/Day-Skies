# Day.toml — the Day project manifest (https://daybrite.dev/docs/cli).
#
# `name` and `version` come from Cargo.toml's [package] — they are never restated here.
# Any [app] property can be overridden per platform ([app.ios]), per toolkit ([app.qt]),
# or per target ([app.macos-appkit]); the most specific table wins.
schema = 1

[app]
id = "dev.daybrite.dayskies"
title = "Day Skies"
build = 1
# The 7 shipping platform-toolkit pairs. `windows-winui`, `linux-gtk`, and `linux-qt` build in CI
# on their native hosts; on a macOS dev box we exercise the toolkits locally as `macos-appkit`,
# `macos-gtk`, `macos-qt`, `ios-uikit`, `android-widget`, and `ohos-arkui` (GTK/Qt are portable, so
# `macos-gtk`/`macos-qt` stand in for `linux-gtk`/`linux-qt`). `day build -p <target>` accepts any
# host-buildable target regardless of this list.
targets = [
  "windows-winui",
  "macos-appkit",
  "linux-gtk",
  "linux-qt",
  "ios-uikit",
  "android-widget",
  "ohos-arkui",
]

# Localization is declared in Rust via `install_locales("en", …)` in src/lib.rs (en default; also
# fr, ar, zh-CN). Force a locale at launch with `day launch --locale <bcp47>`.

[window]
width = 960
height = 640
