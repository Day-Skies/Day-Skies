# Day Skies walkthrough (https://daybrite.dev/docs/dayscript).
#
# Run against deterministic mock data so screenshots are reproducible across runs and locales:
#
#     day launch -p macos-appkit --env WEATHER_MOCK=1 --script scripts/weather.yaml
#     day launch -p macos-appkit --env WEATHER_MOCK=1 --locale ar --script scripts/weather.yaml
#
# Screenshots land in build/day/screenshots/<target>/<locale-or-default>/<name>.png
name: day-skies-walkthrough
description: Visit each city with mock data; assert hero content; capture per-city screenshots.
flow:
  # The nav host and the first city (San Francisco) mount immediately.
  - wait_for: { id: nav }
  - wait_for: { id: hero-temp }
  - assert_text: { id: hero-city, key: city_san_francisco }
  - assert_text: { id: hero-temp, text: "18°" }
  - assert_visible: { id: hourly }
  - assert_visible: { id: ten-day }
  - screenshot: san-francisco

  - navigate: { route: new-york }
  - wait_for: { id: hero-temp }
  - assert_text: { id: hero-temp, text: "27°" }
  - screenshot: new-york

  - navigate: { route: london }
  - wait_for: { id: hero-temp }
  - assert_text: { id: hero-temp, text: "14°" }
  - screenshot: london

  # Tokyo's mock clock is night → moon glyph + night sky.
  - navigate: { route: tokyo }
  - wait_for: { id: hero-temp }
  - assert_text: { id: hero-temp, text: "24°" }
  - screenshot: tokyo

  - navigate: { route: sydney }
  - wait_for: { id: hero-temp }
  - assert_text: { id: hero-temp, text: "12°" }
  - screenshot: sydney

  # Settings: switch to Fahrenheit and verify the temperature labels re-render reactively
  # (mock San Francisco is 18°C = 64°F), then restore Celsius so reruns stay deterministic
  # (the unit persists via day-part-prefs).
  - navigate: { route: settings }
  - wait_for: { id: unit-picker }
  - assert_visible: { id: host-field }
  - screenshot: settings
  - select: { id: unit-picker, index: 1 }
  - navigate: { route: san-francisco }
  - wait_for: { id: hero-temp }
  - assert_text: { id: hero-temp, text: "64°" }
  - screenshot: san-francisco-fahrenheit
  - navigate: { route: settings }
  - wait_for: { id: unit-picker }
  - select: { id: unit-picker, index: 0 }
  - navigate: { route: san-francisco }
  - assert_text: { id: hero-temp, text: "18°" }
